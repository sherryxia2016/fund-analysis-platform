name: Update Fund Data via Batch Processing

on:
  schedule:
    # 每天运行多次（例如每小时一次），以逐步完成所有基金的处理
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt


      - name: Run one batch of fund data processing
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          CI: true # 告诉脚本在CI环境中运行，只处理一个批次
        run: |
          python3 scripts/fetch_fund_data.py

      - name: Upload data to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npx @vercel/blob put fund_info.json --token "${{ secrets.BLOB_READ_WRITE_TOKEN }}" --public --body data/fund_info.json
          npx @vercel/blob put progress.json --token "${{ secrets.BLOB_READ_WRITE_TOKEN }}" --public --body data/progress.json
