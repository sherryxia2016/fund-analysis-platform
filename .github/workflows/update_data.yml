name: Update Fund Data and Upload to Vercel Blob

on:
  schedule:
    - cron: '0 16 * * *' # 北京时间午夜
  workflow_dispatch: # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch latest fund data
        run: |
          python scripts/fetch_fund_data.py
      
      - name: Convert data to JSON
        run: |
          python scripts/convert_csv_to_json.py

      - name: Upload data to Vercel Blob
        env:
          VERCEL_BLOB_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          vercel-blob put frontend/public/data/fund_info.json --token "$VERCEL_BLOB_TOKEN" --public
